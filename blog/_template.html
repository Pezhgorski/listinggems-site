<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[ARTICLE TITLE] &mdash; ListingGems Blog</title>
  <meta name="description" content="[150-160 char meta description]">
  <meta property="og:title" content="[ARTICLE TITLE]">
  <meta property="og:description" content="[META DESCRIPTION]">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://listinggems.com/blog/[slug]">
  <meta property="og:image" content="https://listinggems.com/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="[ARTICLE TITLE]">
  <meta name="twitter:description" content="[META DESCRIPTION]">
  <meta name="twitter:image" content="https://listinggems.com/og-image.png">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://listinggems.com/blog/[slug]">
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/site.css">
  <link rel="stylesheet" href="../assets/blog.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "[ARTICLE TITLE]",
    "description": "[META DESCRIPTION]",
    "image": "https://listinggems.com/og-image.png",
    "datePublished": "YYYY-MM-DD",
    "dateModified": "YYYY-MM-DD",
    "author": { "@type": "Organization", "name": "ListingGems Team" },
    "publisher": {
      "@type": "Organization",
      "name": "ListingGems",
      "logo": { "@type": "ImageObject", "url": "https://listinggems.com/logo.png" }
    },
    "mainEntityOfPage": { "@type": "WebPage", "@id": "https://listinggems.com/blog/[slug]" }
  }
  </script>
  <!-- If the article has a FAQ, add a second JSON-LD block with FAQPage schema here. -->
</head>
<body>

<!-- @begin nav -->
<!-- @end nav -->

<div class="breadcrumb"><a href="../blog/">&larr; Back to blog</a></div>

<article>
  <h1>[ARTICLE TITLE]</h1>
  <div class="article-meta">[DATE] &middot; [X] min read</div>

  <img src="../images/[hero-image].webp" alt="[descriptive alt text]">

  <div class="tldr-box">
    <h2>TL;DR</h2>
    <ul>
      <li>[bullet 1]</li>
      <li>[bullet 2]</li>
      <li>[bullet 3]</li>
    </ul>
  </div>

  <p>[Opening paragraph &mdash; direct answer to the article's title question, no preamble.]</p>

  <h2>[Section heading]</h2>
  <p>[Body]</p>

  <section class="faq-section">
    <h2>Frequently asked questions</h2>
    <div class="faq-item">
      <button class="faq-question">[Question] <span class="faq-toggle">+</span></button>
      <div class="faq-answer"><p>[Answer with citation links]</p></div>
    </div>
  </section>
</article>

<section class="footer-cta">
  <div class="container">
    <!-- @begin footer-links -->
    <!-- @end footer-links -->
  </div>
</section>

</body>
</html>
